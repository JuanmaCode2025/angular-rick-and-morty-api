<div 
  class="w-full max-w-xl rounded-3xl overflow-hidden bg-slate-950/90 text-white transition-all duration-300 backdrop-blur-md relative border"
  [ngClass]="{
    'border-slate-800 shadow-none': elevation() === 'flat',
    'shadow-[0_0_30px_rgba(6,182,212,0.15)] border-cyan-500/30': elevation() === 'raised',
    'border-lime-500 shadow-[0_0_40px_rgba(132,204,22,0.25)]': elevation() === 'outlined'
  }"
>
  <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-cyan-400/60 pointer-events-none"></div>
  <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-cyan-400/60 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-cyan-400/60 pointer-events-none"></div>
  <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-cyan-400/60 pointer-events-none"></div>

  <div 
    (click)="onHeaderClick()"
    class="p-6 border-b border-slate-800 bg-gradient-to-b from-slate-900 to-slate-950/40 cursor-pointer hover:from-slate-900/80 hover:to-cyan-950/20 transition-all duration-200 group"
  >
    <h3 class="text-5xl font-black font-mono tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-lime-400 to-emerald-400 group-hover:from-lime-300 group-hover:to-cyan-400 transition-all drop-shadow-[0_2px_8px_rgba(163,230,53,0.3)]">
      {{ title() }}
    </h3>
    
    <div *ngIf="subtitle()" class="flex items-center gap-2 mt-2">
      <span class="inline-block w-2 h-2 bg-cyan-400 rounded-full animate-ping"></span>
      <p class="text-xs text-cyan-400/80 font-mono tracking-widest uppercase font-bold">
        {{ subtitle() }}
      </p>
    </div>
  </div>

  <div class="p-6 bg-gradient-to-b from-slate-950/50 to-slate-900/40">
    <ng-content></ng-content>
  </div>

</div>
