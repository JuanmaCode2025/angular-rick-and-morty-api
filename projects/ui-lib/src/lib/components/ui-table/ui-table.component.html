<div class="w-full overflow-x-auto rounded-xl border border-slate-700 bg-slate-800/40 backdrop-blur-md">
<table class="w-full text-left border-collapse">
  <thead>
    <tr class="border-b border-slate-800 bg-slate-900/50">
      <th *ngFor="let col of columns()" class="p-4 text-xs font-mono font-bold tracking-wider text-lime-400 uppercase">
        {{ col.label }}
      </th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let row of data()" class="border-b border-slate-800/60 hover:bg-slate-800/30 transition-colors duration-150">
      <td *ngFor="let col of columns()" class="p-4 text-sm text-slate-300">
        
        <ng-container *ngIf="col.key !== 'actions'">
          {{ row[col.key] }}
        </ng-container>

        <ng-container *ngIf="col.key === 'actions'">
          <div class="flex items-center gap-2">
            
            <button 
              (click)="actionTriggered.emit({ action: 'view', row: row })"
              class="px-3 py-1.5 text-xs font-mono font-bold text-cyan-400 bg-cyan-950/40 border border-cyan-500/30 rounded-lg hover:bg-cyan-500 hover:text-slate-950 focus:ring-2 focus:ring-cyan-400 focus:outline-none transition-all duration-200">
              👁️ Ver detalle
            </button>

            <button 
              (click)="actionTriggered.emit({ action: 'delete', row: row })"
              class="px-3 py-1.5 text-xs font-mono font-bold text-red-400 bg-red-950/40 border border-red-500/30 rounded-lg hover:bg-red-500 hover:text-slate-950 focus:ring-2 focus:ring-red-400 focus:outline-none transition-all duration-200">
              🗑️ Eliminar
            </button>

          </div>
        </ng-container>

      </td>
    </tr>
  </tbody>
</table>
</div>
