<div class="w-full overflow-x-auto rounded-xl border border-slate-700 bg-slate-800/40 backdrop-blur-md">
  <table class="w-full text-left border-collapse text-sm text-slate-300">
    
    <thead class="bg-slate-800 text-xs font-mono font-bold uppercase tracking-wider text-lime-400 border-b border-slate-700">
      <tr>
        <th *ngFor="let col of columns()" class="py-4 px-5">
          {{ col.label }}
        </th>
      </tr>
    </thead>

    <tbody class="divide-y divide-slate-700/50 font-sans">
      
      <tr *ngIf="loading()">
        <td [attr.colspan]="columns().length" class="text-center py-8 text-lime-500 font-mono animate-pulse">
          🧪 Escaneando base de datos interdimensional...
        </td>
      </tr>

      <tr *ngIf="data().length === 0 && !loading()">
        <td [attr.colspan]="columns().length" class="text-center py-8 text-slate-500 italic">
          No se encontraron registros en este cuadrante.
        </td>
      </tr>

      <tr 
        *ngFor="let row of data()" 
        class="hover:bg-slate-700/20 transition-colors duration-150"
      >
        <td *ngFor="let col of columns()" class="py-3.5 px-5">
          {{ row[col.key] }}
        </td>
      </tr>

    </tbody>
  </table>
</div>
