<button
  [disabled]="disabled() || loading()"
  (click)="handleClick()"
  class="inline-flex items-center justify-center font-medium rounded-lg transition-all duration-200 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed"
  [ngClass]="{
    'bg-lime-500 hover:bg-lime-600 text-slate-900 focus:ring-lime-300': variant() === 'primary',
    'bg-slate-700 hover:bg-slate-600 text-white focus:ring-slate-500': variant() === 'secondary',
    'bg-red-600 hover:bg-red-700 text-white focus:ring-red-400': variant() === 'danger',
    'px-3 py-1.5 text-xs': size() === 'sm',
    'px-5 py-2.5 text-sm': size() === 'md',
    'px-6 py-3 text-base': size() === 'lg'
  }"
>
  <svg 
    *ngIf="loading()" 
    class="animate-spin -ml-1 mr-3 h-5 w-5" 
    [ngClass]="{
      'text-slate-900': variant() === 'primary',
      'text-white': variant() !== 'primary'
    }"
    xmlns="http://www.w3.org/2000/svg" 
    fill="none" 
    viewBox="0 0 24 24"
  >
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </svg>

  <span>{{ label() }}</span>
</button>
